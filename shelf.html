    <meta property="og:type" content="website">
    <meta property="og:title" content="Valia Liu ｜ Portfolio Site">

<body>
    <div id="bg">
        <div class="noise nopc"></div>
    </div>
    <div class="mobile-nav">
        <div class="noise"></div>
        <h1 class="mobile-title"><a href="index.html">Valia Liu</a></h1>
    </div>
    <button class="hamburger-menu">
        ☰
    </button>

    <nav id="navigation"></nav>

    <div class="container">

        <main class="content">
            <div class="shelf-layout">
                <header class="shelf-header">
                    <h1 class="shelf-header-title">Shelf</h1>
                    <div class="shelf-stats recommend-cursor-target">
                        <span class="shelf-stat shelf-stat--reading">
                            <span class="shelf-stat-label">reading</span>
                            <span class="shelf-stat-num" id="shelfStatReading">—</span>
                        </span>
                        <span class="shelf-stat shelf-stat--read">
                            <span class="shelf-stat-label">read</span>
                            <span class="shelf-stat-num" id="shelfStatRead">—</span>
                        </span>
                    </div>
                </header>
                <div class="shelf-rows" id="shelfRows">
                    <!-- Populated by shelf.js -->
                </div>
            </div>
        </main>

    </div>

    <script>
        fetch("components/navigation.html")
            .then(function (r) { return r.text(); })
            .then(function (html) {
                document.getElementById("navigation").innerHTML = html;
                if (typeof bindNavigationEvents === "function") {
                    bindNavigationEvents();
                }
                const script = document.createElement('script');
                script.src = 'scripts/colorTheme.js';
                document.head.appendChild(script);
            });
    </script>

    <script src="scripts/pageTransition.js"></script>
    <script src="scripts/navigation.js"></script>
    <script src="scripts/customCursor.js"></script>
    <script src="scripts/shelf.js"></script>
</body>

</html>
