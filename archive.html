<body>
    <div id="bg"><div class="noise nopc"></div></div>
    <div class="mobile-nav">
        <div class="noise"></div>
        <h1 class="mobile-title"><a href="index.html">Valia Liu</a></h1>
        <button class="hamburger-menu">
            ☰
        </button>
    </div>

    <nav id="navigation"></nav>
    
    <div class="container">

        <!-- Archive gallery - masonry layout handled by JS -->
        <main class="content">
            <img src="archive/projects/do_not_hold_doors.jpg">
            <img src="archive/projects/portrait.jpg">
            <img src="archive/projects/ring2.jpg">
            <img src="archive/projects/haleyon.jpg">
            <img src="archive/projects/moon.jpg">
            <img src="archive/projects/ring1.jpg">
            <img src="archive/projects/you_may_not_ask.jpg">
            <img src="archive/projects/pink fish.gif">
            <img src="archive/projects/sky 1 0-80.gif">
            <img src="archive/projects/Oh Hyuk.gif">
            <img src="archive/projects/blackmambacut-ezgif.com-resize.gif">
            <img src="archive/projects/anti white cube.jpg">
            <img src="archive/projects/moth puff.jpg">
            <img src="archive/projects/moth puff2.jpg">
            <img src="archive/projects/snow print.jpg">
            <img src="archive/projects/moth cut.jpg">
            <img src="archive/projects/moth wool.jpg">
            <img src="archive/projects/v necklace.jpg">
        </main>
    </div>

    <!-- Lightbox Modal -->
    <div class="lightbox-modal" id="lightboxModal">
        <div class="lightbox-overlay"></div>
        <div class="lightbox-container">
            <button class="lightbox-close" id="lightboxClose">✕</button>
            <img class="lightbox-image" id="lightboxImage">
            <button class="lightbox-prev" id="lightboxPrev"><</button>
            <button class="lightbox-next" id="lightboxNext">></button>
        </div>
    </div>

    <script>
      fetch("components/navigation.html")
        .then(function(r){ return r.text(); })
        .then(function(html){
          document.getElementById("navigation").innerHTML = html;
          if (typeof bindNavigationEvents === "function") {
            bindNavigationEvents();
          }
          // Load color theme script after navigation is injected
          const script = document.createElement('script');
          script.src = 'scripts/colorTheme.js';
          document.head.appendChild(script);
        });
    </script>
  
    <script src="scripts/pageTransition.js"></script>
    <script src="scripts/navigation.js"></script>
    <script src="scripts/archiveMasonry.js"></script>
    <script src="scripts/archiveLightbox.js"></script>
</body>
</html>
