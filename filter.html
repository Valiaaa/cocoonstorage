    <link rel="stylesheet" href="styles/base.css">

<body>
    <div id="bg"><div class="noise nopc"></div></div>
    <div class="mobile-nav">
        <div class="noise"></div>
        <h1 class="mobile-title"><a href="index.html">Valia Liu</a></h1>
    </div>
    <button class="hamburger-menu expanded">
        ☰
    </button>

    <nav id="navigation" class="expanded"></nav>

    <div class="container">

        <main class="home content">
            <div class="projects-grid" id="filtered-projects">
            </div>
        </main>
    </div>

    <script>
        fetch("components/navigation.html")
          .then(function(r){ return r.text(); })
          .then(function(html){
            document.getElementById("navigation").innerHTML = html;
            if (typeof bindNavigationEvents === "function") {
              bindNavigationEvents();
            }
            // Load color theme script after navigation is injected
            const script = document.createElement('script');
            script.src = 'scripts/colorTheme.js';
            document.head.appendChild(script);
          });
    </script>

    <script src="scripts/renderFilter.js"></script>
    <script src="scripts/pageTransition.js"></script>
    <script src="scripts/navigation.js"></script>
    <script src="scripts/customCursor.js"></script>
</body>
