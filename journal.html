<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>Journal - Valia Liu</title>
    <meta name="description" content="Valia Liu's journal — notebooks, notes, and sketchbooks.">
    <link rel="icon" href="assets/icons/icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap">

    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/navigation.css">
    <link rel="stylesheet" href="styles/journal.css">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YB3PB2KE3B"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-YB3PB2KE3B');
    </script>
</head>

<body>
    <div id="bg">
        <div class="noise nopc"></div>
    </div>
    <div class="mobile-nav">
        <div class="noise"></div>
        <h1 class="mobile-title"><a href="index.html">Valia Liu</a></h1>
    </div>
    <button class="hamburger-menu">
        ☰
    </button>

    <nav id="navigation"></nav>

    <div class="container">

        <main class="content journal">
            <div class="journal-layout">

                <!-- ── 1. Sidebar ─────────────────────────────── -->
                <aside class="journal-sidebar">
                    <h2 class="journal-sidebar-title">Journal</h2>
                    <div class="journal-notebook-list" id="notebookList">
                        <!-- Populated by journal.js -->
                    </div>
                </aside>

                <div class="journal-toc" id="journalToc">
                    <!-- Ghost title spacer — invisible, keeps top-alignment with sidebar -->
                    <h2 class="journal-sidebar-title journal-col-spacer" aria-hidden="true">Journal</h2>
                    <!-- Populated by journal.js -->
                </div>

                <!-- ── 2b. Viewer ────────────────────────────── -->
                <div class="journal-viewer" id="journalViewer">

                    <!-- Mobile controls top -->
                    <div class="mobile-viewer-header" id="mobileViewerHeader">
                        <button class="mobile-back-btn" id="mobileBackBtn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="19" y1="12" x2="5" y2="12"></line>
                                <polyline points="12 19 5 12 12 5"></polyline>
                            </svg>
                        </button>
                    </div>

                    <!-- Ghost title spacer — invisible, keeps top-alignment with sidebar -->
                    <h2 class="journal-sidebar-title journal-col-spacer" aria-hidden="true">Journal</h2>

                    <!-- SVG base pedestal — decorative only, not selectable -->
                    <svg class="journal-base-svg" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg"
                        aria-hidden="true" focusable="false">
                        <ellipse cx="600" cy="180" rx="560" ry="55" fill="none" stroke="currentColor" stroke-width="1.5"
                            opacity="0.6" />
                        <ellipse cx="600" cy="165" rx="520" ry="42" fill="none" stroke="currentColor" stroke-width="1"
                            opacity="0.35" />
                        <line x1="40" y1="180" x2="40" y2="80" stroke="currentColor" stroke-width="1" opacity="0.3" />
                        <line x1="1160" y1="180" x2="1160" y2="80" stroke="currentColor" stroke-width="1"
                            opacity="0.3" />
                    </svg>

                    <!-- Content overlay with cut-style border -->
                    <div class="notebook-page-wrap">
                        <div class="notebook-page-frame">
                            <div class="notebook-page-cut"></div>
                            <div class="notebook-page" id="notebookPage">
                                <!-- Populated by journal.js -->
                            </div>
                        </div>
                    </div>
                    
                    <!-- Mobile controls bottom -->
                    <div class="mobile-viewer-footer" id="mobileViewerFooter">
                        <button class="mobile-nav-btn prev" id="mobilePrevBtn">
                            <span class="nav-dir">Prev</span>
                            <span class="nav-title" id="mobilePrevTitle">Title</span>
                        </button>
                        <button class="mobile-nav-btn next" id="mobileNextBtn">
                            <span class="nav-dir">Next</span>
                            <span class="nav-title" id="mobileNextTitle">Title</span>
                        </button>
                    </div>

                </div>
                <!-- end .journal-viewer -->

            </div>
            <!-- end .journal-layout -->
        </main>

    </div>

    <script>
        fetch("components/navigation.html")
            .then(function (r) { return r.text(); })
            .then(function (html) {
                document.getElementById("navigation").innerHTML = html;
                if (typeof bindNavigationEvents === "function") {
                    bindNavigationEvents();
                }
                // Load color theme script after navigation is injected
                const script = document.createElement('script');
                script.src = 'scripts/colorTheme.js';
                document.head.appendChild(script);
            });
    </script>

    <script src="scripts/pageTransition.js"></script>
    <script src="scripts/navigation.js"></script>
    <script src="scripts/customCursor.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="scripts/journal.js"></script>
</body>

</html>
